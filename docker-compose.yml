services:
  mcp-server:
    build: .
    image: cloudflare-dns-zt-mcp:latest
    container_name: cloudflare-dns-zt-mcp
    ports:
      - "${MCP_PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Restrict container capabilities
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
